<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI-Ready Extraction</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 12px;
        font: 12px/1.4 Inter, system-ui, sans-serif;
      }

      h2 {
        margin: 0 0 6px;
        font-size: 14px;
      }

      p {
        margin: 0 0 12px;
        opacity: 0.9;
      }

      .buttons {
        display: grid;
        gap: 8px;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: transparent;
        padding: 8px 10px;
        cursor: pointer;
        text-align: left;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <h2>Create AI-Ready Page</h2>
    <p>Choose how variants should be exported from your current selection.</p>

    <div class="buttons">
      <button id="full" type="button">Full variants (separate each variant)</button>
      <button id="compact" type="button">Compact sets (one component set node)</button>
      <button id="close" type="button">Cancel</button>
    </div>

    <script>
      const fullBtn = document.getElementById('full');
      const compactBtn = document.getElementById('compact');
      const closeBtn = document.getElementById('close');

      fullBtn.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'run-extraction', mode: 'full' } }, '*');
      };

      compactBtn.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'run-extraction', mode: 'compact' } }, '*');
      };

      closeBtn.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      };
    </script>
  </body>
</html>
